[loggers]
keys=root,my_library,scripts,my_package,rest_service

[handlers]
keys=consoleHandler,fileHandler,errorFileHandler,restServiceHandler

[formatters]
keys=detailedFormatter,simpleFormatter,jsonFormatter

# --------------
# Loggers
# --------------

# Root logger - catches everything not explicitly configured
[logger_root]
level=DEBUG
handlers=consoleHandler,errorFileHandler

# Custom library logger
[logger_my_library]
level=DEBUG
handlers=fileHandler
qualname=my_library
propagate=0

# Scripts logger
[logger_scripts]
level=DEBUG
handlers=consoleHandler,fileHandler
qualname=scripts
propagate=0

# Package logger
[logger_my_package]
level=INFO
handlers=fileHandler
qualname=my_package
propagate=0

# REST service logger
[logger_rest_service]
level=INFO
handlers=restServiceHandler,errorFileHandler
qualname=rest_service
propagate=0

# --------------
# Handlers
# --------------

# Console Handler - for interactive/script output
[handler_consoleHandler]
class=StreamHandler
level=DEBUG
formatter=simpleFormatter
args=(sys.stdout,)

# General file handler
[handler_fileHandler]
class=handlers.RotatingFileHandler
level=DEBUG
formatter=detailedFormatter
args=('logs/app.log', 'a', 10485760, 5)

# Error-only file handler
[handler_errorFileHandler]
class=handlers.RotatingFileHandler
level=ERROR
formatter=detailedFormatter
args=('logs/errors.log', 'a', 10485760, 5)

# REST service specific handler (JSON format)
[handler_restServiceHandler]
class=handlers.TimedRotatingFileHandler
level=INFO
formatter=jsonFormatter
args=('logs/rest_service.log', 'midnight', 1, 30)

# --------------
# Formatters
# --------------

# Detailed formatter for files
[formatter_detailedFormatter]
format=%(asctime)s - %(name)s - [%(levelname)s] - %(funcName)s:%(lineno)d - %(message)s
datefmt=%Y-%m-%d %H:%M:%S

# Simple formatter for console
[formatter_simpleFormatter]
format=%(levelname)s - %(name)s - %(message)s

# JSON formatter for REST service
[formatter_jsonFormatter]
class=pythonjsonlogger.jsonlogger.JsonFormatter
format=%(asctime)s %(name)s %(levelname)s %(funcName)s %(lineno)d %(message)s